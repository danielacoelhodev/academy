# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_NAME: my-java-app
  DOCKER_TAG_NAME: latest
  ARTIFACT_NAME: my-artifact
  ARTIFACT_PATH: ${{ env.DOCKER_IMAGE_NAME }}.tar

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - uses: ./.github/actions/maven_build

    - uses: ./.github/actions/docker_build
      with:
        image_name: ${{DOCKER_IMAGE_NAME}}
        tag_name: ${{DOCKER_TAG_NAME}}

    - name: Save Docker image to artifact
      run: docker save -o ${{ env.DOCKER_IMAGE_NAME}}.tar ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_TAG_NAME }}

    - uses: actions/upload-artifact@v7
      with:
        name: ${{env.ARTIFACT_NAME}}
        path: ${{ env.ARTIFACT_PATH }}

  list-docker-images:
    needs: build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - uses: actions/download-artifact@v8
        with:
          name: ${{env.ARTIFACT_NAME}}
      - name: Display structure of downloaded files
        run: ls -R

      - name: Docker load
        run: docker load -i ${{env.DOCKER_IMAGE_NAME}}.tar

      - name: List docker images
        run: docker image ls